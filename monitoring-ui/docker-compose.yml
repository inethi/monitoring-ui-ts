services:
  ui:
    container_name: inethi-monitoring-ui
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monitoring-ui.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.monitoring-ui.entrypoints=${TRAEFIK_ENTRYPOINTS}"

networks:
  default:
    external:
      name: "${TRAEFIK_NETWORK_BRIDGE}"
